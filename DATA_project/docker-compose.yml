services:
  argilla:
    image: argilla/argilla-server:latest
    container_name: argilla_server
    environment:
      - ARGILLA_DATABASE_URL=postgresql://postgres:12345678@db:5432/postgres
      - ARGILLA_ELASTICSEARCH_URL=http://elasticsearch:9201
    ports:
      - "6900:6900"
    depends_on:
      elasticsearch:
        condition: service_healthy
      db:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.2
    container_name: data_project-elasticsearch-1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      # 👇👇👇 核心魔法子弹，专治各种不服 👇👇👇
      - ingest.geoip.downloader.enabled=false  # 禁用 GeoIP 下载死循环
      - xpack.ml.enabled=false                 # 禁用沉重的机器学习模块
      - node.store.allow_mmap=false            # 彻底绕过系统底层内存限制！
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  db:
    image: postgres:15.3
    container_name: data_project-db-1
    environment:
      - POSTGRES_PASSWORD=12345678